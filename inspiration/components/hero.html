<!--
  HERO COMPONENT — Premium Service Business
  Source: Synthesised from awwwards.com + godly.website inspiration analysis

  What makes this superior to a standard implementation:
  - Fluid type scale via clamp() — heading tracks viewport, never feels wrong at any size
  - Line-height 100% on display text creates visual mass (awwwards pattern)
  - Tight tracking (-0.03em) on headline — generic generators never do this
  - SVG grain texture overlay adds material depth without images
  - Dual radial gradient background — layered, not flat
  - Spring-style ease on CTA hover (cubic-bezier(0.34,1.56,0.64,1)) — bounces, feels alive
  - Scroll indicator animates only on inner element to avoid AOS jitter
  - Gradient overlay on hero image (if used) via pseudo-element, not inline style
-->

<section class="hero" aria-label="Hero">
  <!-- SVG grain texture filter (invisible, referenced via url()) -->
  <svg width="0" height="0" style="position:absolute">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic"/>
    </filter>
  </svg>

  <div class="hero__bg" aria-hidden="true"></div>
  <div class="hero__grain" aria-hidden="true"></div>

  <div class="hero__inner">
    <div class="hero__eyebrow">Textile Craftsmanship Since 1987</div>

    <h1 class="hero__heading">
      Fabric that<br>
      <em>holds its form</em>
    </h1>

    <p class="hero__sub">
      Premium woven textiles for fashion houses, interior designers,<br>
      and manufacturers who refuse to compromise on quality.
    </p>

    <div class="hero__actions">
      <a href="#contact" class="btn btn--primary">Request Samples</a>
      <a href="#work" class="btn btn--ghost">See Collections</a>
    </div>
  </div>

  <a href="#intro" class="hero__scroll" aria-label="Scroll down">
    <span class="hero__scroll-inner">
      <svg width="20" height="32" viewBox="0 0 20 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="18" height="30" rx="9" stroke="currentColor" stroke-width="1.5"/>
        <circle class="hero__scroll-dot" cx="10" cy="9" r="3" fill="currentColor"/>
      </svg>
    </span>
  </a>
</section>

<style>
  /* ---------- Tokens ---------- */
  :root {
    --c-bg:        #0e0e0d;
    --c-surface:   #161614;
    --c-text:      #f0ede8;
    --c-muted:     #8a8680;
    --c-accent:    #c8a96e;         /* warm gold — derived from textile/craft */
    --c-accent-dk: #9e7d45;

    --shadow-btn: 0 0 0 0 rgba(200,169,110,0),
                  0 2px 8px rgba(200,169,110,0.15),
                  0 8px 32px rgba(200,169,110,0.08);

    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* ---------- Hero shell ---------- */
  .hero {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: var(--c-bg);
    color: var(--c-text);
  }

  /* Dual radial gradient */
  .hero__bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(200,169,110,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(120,90,40,0.10) 0%, transparent 55%);
    pointer-events: none;
  }

  /* SVG grain overlay */
  .hero__grain {
    position: absolute; inset: 0;
    filter: url(#grain);
    opacity: 0.035;
    pointer-events: none;
  }

  /* ---------- Content ---------- */
  .hero__inner {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: clamp(80px, 12vw, 160px) clamp(24px, 6vw, 80px) clamp(60px, 8vw, 100px);
    max-width: 900px;
  }

  .hero__eyebrow {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: clamp(11px, 1.2vw, 13px);
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--c-accent);
    margin-bottom: clamp(20px, 3vw, 32px);
  }

  .hero__heading {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(56px, 8vw, 128px);
    font-weight: 300;
    line-height: 1.0;                    /* ← awwwards pattern: 100% for display mass */
    letter-spacing: -0.03em;             /* ← tight tracking on large headings */
    color: var(--c-text);
    margin: 0 0 clamp(24px, 3vw, 40px);
  }
  .hero__heading em {
    font-style: italic;
    color: var(--c-accent);
  }

  .hero__sub {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: clamp(15px, 1.8vw, 18px);
    font-weight: 400;
    line-height: 1.7;                    /* generous body line-height */
    color: var(--c-muted);
    margin: 0 0 clamp(32px, 4vw, 56px);
  }

  /* ---------- Buttons ---------- */
  .hero__actions {
    display: flex;
    gap: clamp(12px, 2vw, 20px);
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 14px 32px;
    border-radius: 4px;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.2s var(--ease-spring), box-shadow 0.2s var(--ease-out), opacity 0.15s ease;
  }

  .btn--primary {
    background: var(--c-accent);
    color: #0e0e0d;
    box-shadow: var(--shadow-btn);
  }
  .btn--primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 0 0 rgba(200,169,110,0),
                0 4px 16px rgba(200,169,110,0.30),
                0 16px 48px rgba(200,169,110,0.15);
  }
  .btn--primary:active { transform: translateY(0); }
  .btn--primary:focus-visible {
    outline: 2px solid var(--c-accent);
    outline-offset: 3px;
  }

  .btn--ghost {
    background: transparent;
    color: var(--c-text);
    border: 1px solid rgba(240,237,232,0.2);
  }
  .btn--ghost:hover {
    background: rgba(240,237,232,0.05);
    border-color: rgba(240,237,232,0.4);
    transform: translateY(-2px);
  }
  .btn--ghost:active { transform: translateY(0); }
  .btn--ghost:focus-visible {
    outline: 2px solid var(--c-text);
    outline-offset: 3px;
  }

  /* ---------- Scroll indicator ---------- */
  .hero__scroll {
    position: absolute;
    bottom: clamp(24px, 4vw, 40px);
    left: 50%;
    transform: translateX(-50%);
    color: var(--c-muted);
    text-decoration: none;
    transition: color 0.2s ease, transform 0.2s var(--ease-spring);
    z-index: 1;
  }
  .hero__scroll:hover { color: var(--c-accent); transform: translateX(-50%) translateY(-3px); }
  .hero__scroll:focus-visible { outline: 2px solid var(--c-accent); outline-offset: 4px; border-radius: 12px; }

  /* Bounce ONLY on inner element — avoids AOS jitter */
  @keyframes scroll-bounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(6px); }
  }
  .hero__scroll-dot {
    animation: scroll-bounce 1.8s ease-in-out infinite;
    animation-delay: 1.5s;
    will-change: transform;
  }
</style>
